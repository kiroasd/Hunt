<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>صيد الكنز الرقمي 🧭</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary-color: #6c5ce7;
            --secondary-color: #a29bfe;
            --accent-color: #fdcb6e;
            --success-color: #00b894;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg-gradient); 
            margin: 0; padding: 15px; min-height: 100vh; color: #2d3436;
        }

        .card { 
            background: rgba(255, 255, 255, 0.95); 
            padding: 25px; border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
            max-width: 500px; margin: 10px auto;
            backdrop-filter: blur(10px);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h1 { color: var(--primary-color); margin: 0 0 10px; font-size: 24px; text-align: center; }
        .subtitle { color: #636e72; font-size: 13px; margin-bottom: 20px; text-align: center; }

        .team-badge { 
            background: var(--accent-color); color: #2d3436;
            padding: 8px 20px; border-radius: 50px;
            font-weight: bold; display: inline-block; margin-bottom: 15px;
        }

        select, button { 
            width: 100%; padding: 15px; margin: 10px 0; 
            border-radius: 15px; border: 2px solid #eee; font-size: 16px;
            outline: none;
        }

        button { 
            background: var(--primary-color); color: white; border: none;
            font-weight: bold; cursor: pointer; transition: 0.3s;
            box-shadow: 0 4px 10px rgba(108, 92, 231, 0.3);
        }

        button:active { transform: scale(0.98); }

        #reader { 
            width: 100%; border-radius: 20px; overflow: hidden; 
            margin: 15px 0; border: 3px solid var(--primary-color);
            background: #000;
        }

        .mission-box { 
            background: #fff9db; padding: 20px; border-right: 5px solid #f1c40f;
            border-radius: 15px; text-align: right; margin: 15px 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .progress-container {
            background: #dfe6e9; height: 12px; border-radius: 10px; margin: 15px 0; overflow: hidden;
        }
        .progress-bar {
            background: var(--success-color); height: 100%; width: 0%; transition: 0.5s;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; text-align: center; }
        th { background: #f1f2f6; padding: 10px; border-radius: 5px; color: #636e72; }
        td { padding: 12px; border-bottom: 1px solid #eee; }

        .hidden { display: none !important; }
        .success-flash { animation: flash 0.6s ease; }
        @keyframes flash { 50% { background: var(--success-color); } }

        .btn-restart { background: #636e72; padding: 10px; font-size: 14px; margin-top: 5px; }
    </style>
</head>
<body id="main-body">

    <div id="login-screen" class="card">
        <h1>🧭 صيد الكنز الرقمي</h1>
        <p class="subtitle">اختر فريقك وابدأ المغامرة!</p>
        <select id="team-select">
            <option value="">-- اختر فريقك --</option>
            <option value="الأحمر">🔴 الفريق الأحمر</option>
            <option value="الأزرق">🔵 الفريق الأزرق</option>
            <option value="الأخضر">🟢 الفريق الأخضر</option>
            <option value="الأصفر">🟡 الفريق الأصفر</option>
            <option value="البرتقالي">🟠 الفريق البرتقالي</option>
            <option value="البنفسجي">🟣 الفريق البنفسجي</option>
        </select>
        <button onclick="startApp()">دخول اللعبة 🚀</button>
    </div>

    <div id="game-screen" class="card hidden">
        <div style="text-align: center;">
            <div class="team-badge" id="team-display"></div>
        </div>
        
        <div class="progress-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>

        <div class="mission-box">
            <strong id="mission-title" style="display:block; margin-bottom:5px; color:#d35400;">المهمة 1</strong>
            <div id="mission-text">جاري تحميل اللغز...</div>
        </div>

        <div id="reader"></div>
        <p id="feedback" style="font-size:13px; color:#636e72; text-align: center;">وجه الكاميرا نحو كود المهمة</p>
        
        <button class="btn-restart" onclick="restartScanner()">🔄 إعادة تشغيل الكاميرا</button>

        <hr style="border:0; border-top:1px solid #eee; margin:25px 0;">
        <h3 style="font-size:18px; color: var(--primary-color);">🏆 الترتيب المباشر للفرق</h3>
        <table id="leaderboard">
            <thead><tr><th>الفريق</th><th>المهمة</th><th>النقاط</th></tr></thead>
            <tbody id="leaderboard-body"></tbody>
        </table>
    </div>

    <div id="winner-screen" class="card hidden" style="text-align:center;">
        <div style="font-size: 70px; margin-bottom: 10px;">🏆</div>
        <h1 style="color:var(--success-color)">مبروك يا أبطال!</h1>
        <p>لقد وجدتم الكنز وأنهيتم جميع المهام بنجاح.</p>
        <div id="final-stats" style="margin: 20px 0; font-weight: bold; color: var(--primary-color);"></div>
        <button onclick="location.reload()">لعبة جديدة 🔄</button>
    </div>

    <script>
        // إعدادات Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyACJ9zKs8EiVCNN8CgOtCNknV1znLNjlY8",
            authDomain: "spiritualtreasurehunt-684b9.firebaseapp.com",
            projectId: "spiritualtreasurehunt-684b9",
            storageBucket: "spiritualtreasurehunt-684b9.firebasestorage.app",
            messagingSenderId: "266754020181",
            appId: "1:266754020181:web:67750b2f5a670a601195dc"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // قائمة الألغاز
        const missions = [
            { q: "اللغز 1: أنا البداية والنهاية.. ابحث عني في مكان الصلاة المرتفع", key: "Alpha_Omega" },
            { q: "اللغز 2: صوتي ينادي المؤمنين من أعلى المنارة.. ما هو؟", key: "Bells" },
            { q: "اللغز 3: مكان يجتمع فيه الأطفال لتعلم كلمة الله..", key: "SundaySchool" },
            { q: "اللغز 4: خبز نأكله لنحيا به.. ابحث عن صورته", key: "Manna" },
            { q: "اللغز 5: سفينة أنقذت العالم من الغرق..", key: "Ark" },
            { q: "اللغز 6: حجر دحرجه الملاك ليعلن القيامة..", key: "Stone" },
            { q: "اللغز 7: شجرة أكل منها آدم..", key: "Apple" },
            { q: "اللغز 8: نبع ماء ارتوى منه الشعب في البرية..", key: "Rock" },
            { q: "اللغز 9: بيت لحم.. مدينة ولد فيها الملك..", key: "King" },
            { q: "اللغز 10: الصليب.. علامة نصرتنا.. ابحث عن أكبر صليب", key: "Victory" }
        ];

        let currentTeam = "";
        let currentMission = 1;
        let html5QrCode;

        async function startApp() {
            currentTeam = document.getElementById('team-select').value;
            if (!currentTeam) return alert("من فضلك اختر الفريق أولاً!");
            
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('team-display').innerText = "فريق: " + currentTeam;
            
            await loadProgress();
            loadLeaderboard();
            startScanner();
        }

        async function loadProgress() {
            const docRef = db.collection('teams').doc(currentTeam);
            const doc = await docRef.get();
            if (doc.exists) {
                currentMission = doc.data().currentMission || 1;
            } else {
                await docRef.set({ currentMission: 1, points: 0, lastUpdate: firebase.firestore.FieldValue.serverTimestamp() });
                currentMission = 1;
            }
            updateUI();
        }

        function updateUI() {
            if (currentMission > 10) {
                document.getElementById('game-screen').classList.add('hidden');
                document.getElementById('winner-screen').classList.remove('hidden');
                document.getElementById('final-stats').innerText = `الفريق: ${currentTeam}`;
            } else {
                document.getElementById('mission-title').innerText = `المهمة ${currentMission} من 10`;
                document.getElementById('mission-text').innerText = missions[currentMission - 1].q;
                document.getElementById('progress-bar').style.width = (currentMission * 10) + "%";
            }
        }

        function startScanner() {
            if (html5QrCode) html5QrCode.clear();
            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 20, qrbox: { width: 250, height: 250 } };
            
            html5QrCode.start({ facingMode: "environment" }, config, (text) => {
                const scanned = text.trim().toLowerCase();
                const target = missions[currentMission - 1].key.toLowerCase();
                if (scanned.includes(target)) {
                    document.getElementById('main-body').classList.add('success-flash');
                    html5QrCode.stop().then(() => {
                        setTimeout(handleSuccess, 600);
                    });
                }
            }).catch(err => {
                console.error("Camera Error:", err);
                document.getElementById('feedback').innerText = "خطأ في الكاميرا، يرجى المحاولة مرة أخرى.";
            });
        }

        async function handleSuccess() {
            currentMission++;
            await db.collection('teams').doc(currentTeam).update({
                currentMission: currentMission,
                points: firebase.firestore.FieldValue.increment(10),
                lastUpdate: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById('main-body').classList.remove('success-flash');
            updateUI();
            if (currentMission <= 10) startScanner();
        }

        function loadLeaderboard() {
            db.collection('teams').orderBy('points', 'desc').onSnapshot(snap => {
                let html = "";
                snap.forEach(doc => {
                    const data = doc.data();
                    const missionDisp = data.currentMission > 10 ? "تم ✅" : `${data.currentMission}/10`;
                    html += `<tr><td><strong>${doc.id}</strong></td><td>${missionDisp}</td><td style="color:var(--success-color); font-weight:bold;">${data.points}</td></tr>`;
                });
                document.getElementById('leaderboard-body').innerHTML = html;
            });
        }

        function restartScanner() { startScanner(); }
    </script>
</body>
</html>
